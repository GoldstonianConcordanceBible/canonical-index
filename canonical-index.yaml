## Canonical Philosophy

The GCB project approaches canon not only as a historical list of texts but as a **structured dataset for theological reasoning, cross-reference analysis, and AI-assisted study**.

This repository therefore treats canon as:

- a **registry**
- a **retrieval system**
- a **knowledge graph foundation**