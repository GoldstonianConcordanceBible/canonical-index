openapi: 3.1.0
info:
  title: Goldstonian Concordance Bible API
  version: v2
  description: Static and portable API contract for the GCB canonical index.

paths:
  /api/books/{book_id}.json:
    get:
      summary: Retrieve canonical metadata for a book
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Book metadata response

  /api/verses/{verse_id}.json:
    get:
      summary: Retrieve verse-level metadata
      parameters:
        - name: verse_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verse response

  /api/themes/{theme_id}.json:
    get:
      summary: Retrieve theme metadata
      parameters:
        - name: theme_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Theme response